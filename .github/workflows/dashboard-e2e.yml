name: Dashboard E2E

on:
  pull_request:
    paths:
      - 'apps/retail-admin/**'
      - 'packages/**'
      - 'internal/**'
      - 'tests/e2e/**'
      - 'playwright.config.ts'
      - '.github/actions/setup-node/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.node-version'
      - '.nvmrc'
      - '.github/workflows/dashboard-e2e.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/retail-admin/**'
      - 'packages/**'
      - 'internal/**'
      - 'tests/e2e/**'
      - 'playwright.config.ts'
      - '.github/actions/setup-node/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.node-version'
      - '.nvmrc'
      - '.github/workflows/dashboard-e2e.yml'

permissions:
  contents: read

env:
  CI: true
  TZ: Asia/Shanghai

jobs:
  dashboard-e2e:
    name: Dashboard E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run dashboard E2E
        run: pnpm test:e2e:dashboard

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
