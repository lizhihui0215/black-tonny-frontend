name: Dashboard E2E

on:
  pull_request:
    paths:
      - 'apps/retail-admin/**'
      - 'packages/**'
      - 'internal/**'
      - 'tests/e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.node-version'
      - '.nvmrc'
      - '.forgejo/workflows/dashboard-e2e.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/retail-admin/**'
      - 'packages/**'
      - 'internal/**'
      - 'tests/e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.node-version'
      - '.nvmrc'
      - '.forgejo/workflows/dashboard-e2e.yml'
  workflow_dispatch:

env:
  CI: true
  TZ: Asia/Shanghai

jobs:
  dashboard-e2e:
    name: Dashboard E2E
    # Adjust this label to match your Forgejo/Gitea self-hosted runner.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run dashboard runtime guardrail
        run: pnpm test:e2e:dashboard
